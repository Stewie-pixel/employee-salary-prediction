name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir hf-deploy
          cp main.py hf-deploy/
          cp model.py hf-deploy/
          cp requirements.txt hf-deploy/
          cp Dockerfile hf-deploy/
          cp README.md hf-deploy/

          mkdir hf-deploy/models
          cp models/lr_model.pkl hf-deploy/models/
          cp models/xgb_model.pkl hf-deploy/models/
          cp models/feature_names.pkl hf-deploy/models/
          cp models/encoders.pkl hf-deploy/models/
          cp models/metrics.pkl hf-deploy/models/

          cd hf-deploy
          git init
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push https://Stewie-pixel:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Stewie-pixel/employee-salary-prediction main --force

      - name: Trigger central deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CENTRAL_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Stewie-pixel/AI-project-collection/dispatches \
            -d '{
              "event_type": "deploy-model",
              "client_payload": {
                "model_name": "employee-salary-prediction",
                "docker_image": "edwardes/employee-salary-prediction:latest",
                "subdomain": "employee-salary",
                "title": "Employee Salary Prediction",
                "models": "Linear Regression + XGBoost",
                "domain": "Regression",
                "accuracy": "~92%",
                "tags": "Regression,Tabular,Ensemble",
                "github": "https://github.com/Stewie-pixel/employee-salary-prediction",
                "hf_space": "https://huggingface.co/spaces/Stewie-pixel/employee-salary-prediction",
                "status": "live"
              }
            }'
