name: Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag employee-salary-prediction:${{ github.sha }} \
            --tag employee-salary-prediction:latest \
            .

      - name: Verify Docker image
        run: docker images employee-salary-prediction

      - name: Run container and verify predictions
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/models:/app/models \
            employee-salary-prediction:latest

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag employee-salary-prediction:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:${{ github.sha }}
          docker tag employee-salary-prediction:latest ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:latest
