name: Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag employee-salary-prediction:${{ github.sha }} \
            --tag employee-salary-prediction:latest \
            .

      - name: Verify Docker image
        run: docker images employee-salary-prediction

      - name: Run container and verify API health
        run: |
          docker run -d \
            -p 8000:8000 \
            -v ${{ github.workspace }}/models:/app/models \
            --name salary-api \
            employee-salary-prediction:latest
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop salary-api

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag employee-salary-prediction:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:${{ github.sha }}
          docker tag employee-salary-prediction:latest ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:latest

      - name: Trigger central deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CENTRAL_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Stewie-pixel/AI-project-collection/dispatches \
            -d '{
              "event_type": "deploy-model",
              "client_payload": {
                "model_name": "employee-salary-prediction",
                "docker_image": "${{ secrets.DOCKER_USERNAME }}/employee-salary-prediction:latest",
                "subdomain": "employee-salary"
              }
            }'